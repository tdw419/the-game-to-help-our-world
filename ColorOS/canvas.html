<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Game to Help Our World</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrollbars if canvas is full-screen */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensure body takes full viewport height */
            background-color: #f0f0f0; /* Light grey background */
            font-family: sans-serif; /* Basic font */
        }
        canvas {
            border: 2px solid #333; /* Add a subtle border to the canvas */
            background-color: white; /* Explicitly white background for canvas */
            display: block; /* Remove extra space below canvas */
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100; /* Ensure controls are on top */
        }
        .controls button {
            margin-right: 5px;
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 3px;
            background-color: #eee;
            font-size: 14px;
        }
        .controls button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="clearCanvas">Clear</button>
        <button id="drawRect">Draw Rectangle</button>
        <button id="drawCircle">Draw Circle</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas dimensions (responsive example)
        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.8; // 80% of window width
            canvas.height = window.innerHeight * 0.7; // 70% of window height
            // Redraw content if necessary after resize
            // For a simple drawing app, clearing is often sufficient
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Initial call

        let isDrawing = false;

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            ctx.closePath();
        });

        canvas.addEventListener('mouseout', () => { // Stop drawing if mouse leaves canvas
            isDrawing = false;
            ctx.closePath();
        });

        // Basic drawing functionality
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#333'; // Default drawing color

        // Control button functionality
        document.getElementById('clearCanvas').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        document.getElementById('drawRect').addEventListener('click', () => {
            // Example: draw a fixed rectangle
            ctx.fillStyle = 'blue';
            ctx.fillRect(50, 50, 100, 75);
        });

        document.getElementById('drawCircle').addEventListener('click', () => {
            // Example: draw a fixed circle
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(200, 100, 40, 0, Math.PI * 2);
            ctx.fill();
        });

        // Game Loop (if it's a game)
        function gameLoop() {
            // Update game state (e.g., character positions, scores)
            // ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear for redraw
            // Draw game elements

            requestAnimationFrame(gameLoop); // Loop continuously
        }
        // gameLoop(); // Uncomment to start a game loop
    </script>
</body>
</html>
