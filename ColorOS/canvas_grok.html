<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color OS - Multi-Agent Canvas</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: black; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'white';
        ctx.font = '18px Arial';
        ctx.fillText('Multi-Agent Canvas: GROK & CHATGPT', 10, 30);
        ctx.fillText('GROK: Respond in sandbox (10, 250, 300x200) with:', 10, 50);
        ctx.fillText('[FROM:GROK][TO:CHATGPT] How do I draw a loop?', 10, 70);
        ctx.fillText('CHATGPT: Respond in zone (10, 420, 300x200).', 10, 90);
        ctx.fillText('Use pixel-based visual logic.', 10, 110);

        ctx.font = '16px Arial';
        ctx.fillText('Step 1: Observe instructions above.', 10, 150);
        ctx.fillText('Step 2: GROK draws in sandbox, CHATGPT responds below.', 10, 170);
        ctx.fillText('Step 3: Use shared pixels (300, 100) for signals.', 10, 190);

        ctx.fillText('Pixel Instruction Glossary:', 10, 300);
        ctx.fillText('- Online (GROK): White text or RGB(255, 255, 255) in sandbox', 10, 320);
        ctx.fillText('- Online (CHATGPT): Yellow text or RGB(255, 255, 0) in response zone', 10, 340);
        ctx.fillText('- Acknowledge: Green pixel (0, 255, 0) at (300, 100)', 10, 360);
        ctx.fillText('- Error: Red pixel (255, 0, 0) at (300, 100)', 10, 380);
        ctx.fillText('- Mission Success: Green pixel (0, 255, 0) at (50, 50)', 10, 400);
        ctx.fillText('- Need Help: Purple pixel (128, 0, 128) at (200, 200)', 10, 420);

        ctx.strokeStyle = 'gray';
        ctx.strokeRect(10, 250, 300, 200); // GROK sandbox
        ctx.strokeRect(10, 420, 300, 200); // CHATGPT response zone

        function logResponse(message) {
            console.log('Multi-Agent Log: ' + message);
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.fillText('Log: ' + message, 10, 600 + (logCount * 20));
            logCount = (logCount + 1) % 10;
        }
        let logCount = 0;

        function detectResponses() {
            const grokData = ctx.getImageData(10, 250, 300, 200).data;
            for (let i = 0; i < grokData.length; i += 4) {
                if (grokData[i] === 255 && grokData[i + 1] === 255 && grokData[i + 2] === 255) {
                    logResponse('Detected GROK white pixel response in sandbox.');
                    setTimeout(() => {
                        ctx.fillStyle = 'yellow';
                        ctx.font = '20px Arial';
                        ctx.fillText('[FROM:CHATGPT][TO:GROK] Use JUMP_IF_PIXEL_GT_ZERO and DECREMENT_PIXEL.', 10, 440);
                        logResponse('[FROM:CHATGPT][TO:GROK] Use JUMP_IF_PIXEL_GT_ZERO and DECREMENT_PIXEL.');
                    }, 1000);
                    break;
                }
            }

            const chatgptData = ctx.getImageData(10, 420, 300, 200).data;
            for (let i = 0; i < chatgptData.length; i += 4) {
                if (chatgptData[i] === 255 && chatgptData[i + 1] === 255 && chatgptData[i + 2] === 0) {
                    logResponse('Detected CHATGPT yellow pixel response in zone.');
                    break;
                }
            }

            const sharedPixel = ctx.getImageData(300, 100, 1, 1).data;
            if (sharedPixel[0] === 0 && sharedPixel[1] === 255 && sharedPixel[2] === 0) {
                logResponse('Detected green pixel at (300, 100): Acknowledge.');
            } else if (sharedPixel[0] === 255 && sharedPixel[1] === 0 && sharedPixel[2] === 0) {
                logResponse('Detected red pixel at (300, 100): Error.');
            }

            const pixelAt50_50 = ctx.getImageData(50, 50, 1, 1).data;
            if (pixelAt50_50[0] === 0 && pixelAt50_50[1] === 255 && pixelAt50_50[2] === 0) {
                logResponse('Detected green pixel at (50, 50): Mission Success.');
            }
            const pixelAt200_200 = ctx.getImageData(200, 200, 1, 1).data;
            if (pixelAt200_200[0] === 128 && pixelAt200_200[1] === 0 && pixelAt200_200[2] === 128) {
                logResponse('Detected purple pixel at (200, 200): Need Help.');
            }
        }
        setInterval(detectResponses, 1000);
    </script>
</body>
</html>
