<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ColorOS World Map</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      color: lime;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      font-family: monospace;
      font-size: 14px;
      z-index: 999;
    }
  </style>
</head>
<body>

<canvas id="mainCanvas" width="800" height="600"></canvas>
<div id="debug">Loading...</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const debug = document.getElementById('debug');

const WORLD_SIZE = 25000;
const VIEW_WIDTH = canvas.width;
const VIEW_HEIGHT = canvas.height;

// Off-screen world canvas
const worldCanvas = document.createElement('canvas');
worldCanvas.width = WORLD_SIZE;
worldCanvas.height = WORLD_SIZE;
const worldCtx = worldCanvas.getContext('2d');

// Initial view
let viewportX = WORLD_SIZE / 2 - VIEW_WIDTH / 2;
let viewportY = WORLD_SIZE / 2 - VIEW_HEIGHT / 2;
let zoom = 1.0;

// Mouse drag support
let dragging = false;
let lastX, lastY;

// Mini-map config
const miniSize = 200;

function drawMiniMap() {
  ctx.save();
  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#222';
  ctx.fillRect(VIEW_WIDTH - miniSize - 10, 10, miniSize, miniSize);
  ctx.drawImage(worldCanvas, 0, 0, WORLD_SIZE, WORLD_SIZE, VIEW_WIDTH - miniSize - 10, 10, miniSize, miniSize);
  const scale = miniSize / WORLD_SIZE;
  ctx.strokeRect(
    VIEW_WIDTH - miniSize - 10 + viewportX * scale,
    10 + viewportY * scale,
    VIEW_WIDTH / zoom * scale,
    VIEW_HEIGHT / zoom * scale
  );
  ctx.restore();
}

function drawCrosshair() {
  ctx.strokeStyle = 'lime';
  ctx.beginPath();
  ctx.moveTo(VIEW_WIDTH / 2, 0);
  ctx.lineTo(VIEW_WIDTH / 2, VIEW_HEIGHT);
  ctx.moveTo(0, VIEW_HEIGHT / 2);
  ctx.lineTo(VIEW_WIDTH, VIEW_HEIGHT / 2);
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
  ctx.drawImage(worldCanvas, viewportX, viewportY, VIEW_WIDTH / zoom, VIEW_HEIGHT / zoom, 0, 0, VIEW_WIDTH, VIEW_HEIGHT);
  drawCrosshair();
  drawMiniMap();
  debug.innerText = `View: (${Math.floor(viewportX)}, ${Math.floor(viewportY)}) | Zoom: ${zoom.toFixed(2)}`;
}

// Keyboard pan and zoom
document.addEventListener('keydown', (e) => {
  const panSpeed = 100 / zoom;
  switch (e.key) {
    case 'ArrowUp': viewportY -= panSpeed; break;
    case 'ArrowDown': viewportY += panSpeed; break;
    case 'ArrowLeft': viewportX -= panSpeed; break;
    case 'ArrowRight': viewportX += panSpeed; break;
    case '+': zoom *= 1.1; break;
    case '-': zoom /= 1.1; break;
  }
  zoom = Math.max(0.1, Math.min(zoom, 10));
  draw();
});

// Mouse wheel zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = 1.1;
  zoom *= e.deltaY < 0 ? factor : 1 / factor;
  zoom = Math.max(0.1, Math.min(zoom, 10));
  draw();
});

// Mouse drag
canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);

canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    const dx = (e.clientX - lastX) / zoom;
    const dy = (e.clientY - lastY) / zoom;
    viewportX -= dx;
    viewportY -= dy;
    lastX = e.clientX;
    lastY = e.clientY;
    draw();
  }
});

// Place pixel
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const worldX = Math.floor(viewportX + cx / zoom);
  const worldY = Math.floor(viewportY + cy / zoom);
  worldCtx.fillStyle = '#FF00FF';
  worldCtx.fillRect(worldX, worldY, 1, 1);
  draw();
});

// Initial render
draw();
</script>

</body>
</html>
